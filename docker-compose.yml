version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: discover-backend
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://0.0.0.0:8080
      - Jwt__Key=DiscoverMadinaSecretKey2025!ProductionChangeThis!
      - Jwt__Issuer=DiscoverMadina
      - Jwt__Audience=DiscoverMadinaUsers
    volumes:
      - backend_uploads:/app/wwwroot/uploads
      - backend_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: discover-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_uploads:
  backend_data:
