<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>تسجيل الدخول | Discover Madina</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css?v=2"/>
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:auto;padding:20px;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(201,168,76,.07),transparent 60%);pointer-events:none;}
    .auth-wrap{width:100%;max-width:440px;}
    .auth-logo{text-align:center;margin-bottom:32px;}
    .auth-logo-icon{width:72px;height:72px;margin:0 auto 14px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));border-radius:20px;display:flex;align-items:center;justify-content:center;font-family:'Amiri',serif;font-size:2.4rem;color:var(--bg-deep);font-weight:700;}
    .auth-logo h1{font-family:'Amiri',serif;font-size:1.8rem;color:var(--gold);margin-bottom:4px;}
    .auth-logo p{font-size:.8rem;color:var(--text-muted);letter-spacing:3px;}
    .auth-card{background:var(--bg-mid);border:1px solid var(--border);border-radius:var(--radius);padding:32px;box-shadow:var(--shadow);}
    .role-tabs{display:flex;background:var(--bg-deep);border-radius:var(--radius-sm);padding:4px;margin-bottom:24px;}
    .role-tab{flex:1;padding:9px;text-align:center;border-radius:var(--radius-sm);font-family:'Cairo',sans-serif;font-size:.88rem;cursor:pointer;background:none;border:none;color:var(--text-muted);transition:all .2s;}
    .role-tab.active{background:var(--bg-raised);color:var(--gold);font-weight:700;}
    .form-group{margin-bottom:18px;}
    label{display:block;font-size:.82rem;color:var(--text-muted);margin-bottom:7px;font-weight:600;}
    .form-input{width:100%;padding:11px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-main);font-family:'Cairo',sans-serif;font-size:.92rem;outline:none;transition:border-color .2s;}
    .form-input:focus{border-color:var(--gold);}
    .form-input::placeholder{color:var(--text-dim);}
    .btn-main{width:100%;padding:13px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));border:none;border-radius:var(--radius-sm);color:var(--bg-deep);font-family:'Cairo',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s;margin-bottom:14px;}
    .btn-main:hover{opacity:.88;}
    .btn-main:disabled{opacity:.5;cursor:not-allowed;}
    .btn-guest{width:100%;padding:11px;background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-muted);font-family:'Cairo',sans-serif;font-size:.9rem;cursor:pointer;transition:all .2s;margin-bottom:14px;}
    .btn-guest:hover{border-color:var(--gold-dim);color:var(--gold);}
    .divider{text-align:center;font-size:.78rem;color:var(--text-dim);margin:6px 0 14px;}
    .btn-register{width:100%;padding:11px;background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-muted);font-family:'Cairo',sans-serif;font-size:.9rem;cursor:pointer;transition:all .2s;}
    .btn-register:hover{border-color:var(--gold-dim);color:var(--gold);}
    .error-msg{background:rgba(224,85,85,.1);border:1px solid rgba(224,85,85,.3);border-radius:var(--radius-sm);padding:10px 14px;color:#e05555;font-size:.85rem;margin-bottom:14px;display:none;}
    .back-link{display:block;text-align:center;margin-top:20px;font-size:.82rem;color:var(--text-muted);text-decoration:none;transition:color .2s;}
    .back-link:hover{color:var(--gold);}
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-logo">
    <div class="auth-logo-icon">م</div>
    <h1>اكتشف المدينة</h1>
    <p>DISCOVER MADINA</p>
  </div>
  <div class="auth-card">
    <div class="role-tabs">
      <button class="role-tab active" onclick="setRole(this,'user')">مستخدم</button>
      <button class="role-tab" onclick="setRole(this,'admin')">مشرف</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="form-group">
      <label>اسم المستخدم أو البريد الإلكتروني</label>
      <input class="form-input" type="text" id="username" placeholder="أدخل اسم المستخدم" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div class="form-group">
      <label>كلمة المرور</label>
      <input class="form-input" type="password" id="password" placeholder="أدخل كلمة المرور" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn-main" id="loginBtn" onclick="doLogin()">تسجيل الدخول</button>
    <div class="divider">أو</div>
    <button class="btn-guest" onclick="guestLogin()">المتابعة كضيف</button>
    <button class="btn-register" onclick="window.location='register.html'">إنشاء حساب جديد</button>
  </div>
  <a href="../index.html" class="back-link">← تصفح كضيف</a>
</div>
<script>
const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'http://localhost:8080/api'
  : `${window.location.origin}/api`;
let currentRole = 'user';

function setRole(btn, role) {
  currentRole = role;
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

async function doLogin() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value.trim();
  if (!u || !p) { showError('الرجاء إدخال بيانات الدخول'); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = 'جاري التحقق...';
  document.getElementById('errorMsg').style.display = 'none';

  try {
    const res = await fetch(`${API_BASE}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });
    const data = await res.json();
    if (!res.ok) { showError(data.message || 'خطأ في تسجيل الدخول'); return; }

    // Save token + user info
    localStorage.setItem('token', data.token);
    localStorage.setItem('username', data.username);
    localStorage.setItem('role', data.role);

    // Redirect based on role
    if (data.role === 'admin' || data.role === 'superadmin') {
      window.location.href = 'admin.html';
    } else {
      window.location.href = '../index.html';
    }
  } catch (e) {
    showError('تعذر الاتصال بالخادم. تأكد من تشغيل الـ backend.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'تسجيل الدخول';
  }
}

function guestLogin() {
  localStorage.setItem('role', 'guest');
  window.location.href = '../index.html';
}
</script>
</body>
</html>
