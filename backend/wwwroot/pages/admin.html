<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>لوحة الإدارة | Discover Madina</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    body{overflow:auto;}
    .admin-layout{display:flex;min-height:100vh;}
    .admin-nav{width:220px;flex-shrink:0;background:var(--bg-mid);border-left:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
    .nav-brand{padding:20px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
    .nav-brand-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Amiri',serif;font-size:1.3rem;color:var(--bg-deep);font-weight:700;}
    .nav-brand-text{font-size:.82rem;font-weight:700;color:var(--text-main);}
    .nav-brand-sub{font-size:.68rem;color:var(--text-dim);}
    .nav-items{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:4px;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);font-family:'Cairo',sans-serif;font-size:.86rem;color:var(--text-muted);cursor:pointer;background:none;border:none;text-align:right;width:100%;transition:all .2s;}
    .nav-item:hover{background:var(--bg-card);color:var(--text-main);}
    .nav-item.active{background:rgba(201,168,76,.1);color:var(--gold);font-weight:700;}
    .nav-item .ni-icon{font-size:1.1rem;width:22px;text-align:center;flex-shrink:0;}
    .nav-footer{padding:14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;}
    .admin-main{flex:1;padding:24px;overflow-y:auto;background:var(--bg-deep);}
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
    .page-title{font-family:'Amiri',serif;font-size:1.5rem;color:var(--text-main);}
    .admin-badge{display:flex;align-items:center;gap:8px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 14px;font-size:.82rem;}
    .admin-dot{width:8px;height:8px;background:var(--green);border-radius:50%;}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px;}
    .stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;}
    .stat-label{font-size:.78rem;color:var(--text-muted);margin-bottom:8px;}
    .stat-value{font-size:2rem;font-weight:700;color:var(--text-main);line-height:1;}
    .stat-sub{font-size:.74rem;color:var(--green);margin-top:6px;}
    .data-table{width:100%;border-collapse:collapse;}
    .data-table th{text-align:right;padding:12px 14px;font-size:.78rem;color:var(--text-muted);font-weight:600;border-bottom:1px solid var(--border);background:var(--bg-card);}
    .data-table td{padding:12px 14px;font-size:.85rem;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;}
    .data-table tr:hover td{background:rgba(255,255,255,.02);}
    .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700;}
    .badge.religious{background:rgba(201,168,76,.15);color:var(--gold);}
    .badge.cultural{background:rgba(74,144,217,.15);color:var(--blue);}
    .badge.entertainment{background:rgba(46,204,138,.15);color:var(--green);}
    .badge.dining{background:rgba(224,85,85,.15);color:var(--red);}
    .badge.approved{background:rgba(46,204,138,.15);color:var(--green);}
    .badge.pending{background:rgba(201,168,76,.15);color:var(--gold);}
    .badge.rejected{background:rgba(224,85,85,.15);color:var(--red);}
    .action-btns{display:flex;gap:6px;flex-wrap:wrap;}
    .act-btn{padding:5px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-card);color:var(--text-muted);font-family:'Cairo',sans-serif;font-size:.76rem;cursor:pointer;transition:all .2s;}
    .act-btn:hover{border-color:var(--gold-dim);color:var(--gold);}
    .act-btn.danger:hover{border-color:var(--red);color:var(--red);}
    .act-btn.success:hover{border-color:var(--green);color:var(--green);}
    .add-form{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px;}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .form-group{margin-bottom:0;}
    .form-group label{display:block;font-size:.8rem;color:var(--text-muted);margin-bottom:6px;font-weight:600;}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-main);font-family:'Cairo',sans-serif;font-size:.88rem;outline:none;}
    .form-group input:focus,.form-group select:focus{border-color:var(--gold);}
    .form-group textarea{height:80px;resize:none;}
    .form-group select option{background:var(--bg-card);}
    .form-full{grid-column:1/-1;}
    .form-actions{display:flex;gap:10px;margin-top:16px;}
    .section{display:none;}
    .section.active{display:block;}
    .loading{color:var(--text-muted);font-size:.88rem;padding:20px;text-align:center;}
    .img-thumb{width:40px;height:40px;border-radius:8px;object-fit:cover;border:1px solid var(--border);}
    /* Image upload in form */
    .img-upload-wrap{border:2px dashed var(--border);border-radius:var(--radius-sm);padding:20px;text-align:center;cursor:pointer;transition:border-color .2s;}
    .img-upload-wrap:hover{border-color:var(--gold-dim);}
    .img-preview{max-width:100%;max-height:120px;border-radius:8px;margin-top:10px;display:none;}
    @media(max-width:768px){.admin-nav{display:none}.form-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="admin-layout">
  <nav class="admin-nav">
    <div class="nav-brand">
      <div class="nav-brand-icon">م</div>
      <div>
        <div class="nav-brand-text">اكتشف المدينة</div>
        <div class="nav-brand-sub">لوحة الإدارة</div>
      </div>
    </div>
    <div class="nav-items">
      <button class="nav-item active" onclick="showSection('overview',this)"><span class="ni-icon">📊</span>نظرة عامة</button>
      <button class="nav-item" onclick="showSection('attractions',this)"><span class="ni-icon">📍</span>الأماكن</button>
      <button class="nav-item" onclick="showSection('reviews',this)"><span class="ni-icon">⭐</span>التقييمات</button>
      <button class="nav-item" onclick="showSection('users',this)"><span class="ni-icon">👥</span>المستخدمون</button>
    </div>
    <div class="nav-footer">
      <a href="../index.html" class="footer-btn">← الخريطة</a>
      <button class="footer-btn" onclick="logout()">خروج</button>
    </div>
  </nav>

  <main class="admin-main">
    <div class="page-header">
      <div class="page-title" id="pageTitle">نظرة عامة</div>
      <div class="admin-badge"><div class="admin-dot"></div><span id="adminName">مشرف</span></div>
    </div>

    <!-- OVERVIEW -->
    <div class="section active" id="s-overview">
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-label">إجمالي الأماكن</div><div class="stat-value" id="statAttractions">...</div></div>
        <div class="stat-card"><div class="stat-label">التقييمات المعلّقة</div><div class="stat-value" id="statPending">...</div></div>
        <div class="stat-card"><div class="stat-label">المستخدمون</div><div class="stat-value" id="statUsers">...</div></div>
        <div class="stat-card"><div class="stat-label">إجمالي التقييمات</div><div class="stat-value" id="statReviews">...</div></div>
      </div>
      <h3 style="font-family:'Amiri',serif;margin-bottom:14px;color:var(--text-main)">أحدث الأماكن</h3>
      <div id="recentAttractions" class="loading">جاري التحميل...</div>
    </div>

    <!-- ATTRACTIONS -->
    <div class="section" id="s-attractions">
      <div class="add-form">
        <h3 style="font-family:'Amiri',serif;color:var(--text-main);margin-bottom:16px">إضافة / تعديل مكان</h3>
        <input type="hidden" id="editId"/>
        <div class="form-grid">
          <div class="form-group"><label>اسم المكان (عربي)</label><input type="text" id="fName" placeholder="المسجد النبوي"/></div>
          <div class="form-group"><label>الاسم (إنجليزي)</label><input type="text" id="fNameEn" placeholder="Al-Masjid an-Nabawi"/></div>
          <div class="form-group"><label>التصنيف</label>
            <select id="fCategory">
              <option value="religious">🕌 ديني</option>
              <option value="cultural">🏛️ ثقافي</option>
              <option value="entertainment">🎡 ترفيه</option>
              <option value="dining">🍽️ مطاعم</option>
            </select>
          </div>
          <div class="form-group"><label>الأيقونة (Emoji)</label><input type="text" id="fIcon" placeholder="🕌"/></div>
          <div class="form-group"><label>خط العرض</label><input type="number" id="fLat" step="0.0001" placeholder="24.4672"/></div>
          <div class="form-group"><label>خط الطول</label><input type="number" id="fLng" step="0.0001" placeholder="39.6111"/></div>
          <div class="form-group"><label>ساعات العمل</label><input type="text" id="fHours" placeholder="09:00 - 21:00"/></div>
          <div class="form-group"><label>مميز؟</label>
            <select id="fFeatured"><option value="true">نعم</option><option value="false">لا</option></select>
          </div>
          <div class="form-group form-full"><label>الوصف</label><textarea id="fDesc" placeholder="وصف مختصر..."></textarea></div>
          <div class="form-group form-full">
            <label>صورة المكان</label>
            <div class="img-upload-wrap" onclick="document.getElementById('fImage').click()">
              <div id="imgPlaceholder">📷 اضغط لاختيار صورة (JPG, PNG, WEBP - أقل من 5MB)</div>
              <img id="imgPreview" class="img-preview"/>
            </div>
            <input type="file" id="fImage" accept="image/jpeg,image/png,image/webp" style="display:none" onchange="previewImage(this)"/>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn-main" style="flex:0;padding:9px 24px;font-size:.88rem" onclick="saveAttraction()">💾 حفظ</button>
          <button class="modal-btn" style="flex:0;padding:9px 20px" onclick="clearForm()">مسح</button>
        </div>
      </div>
      <div id="attractionsTable" class="loading">جاري التحميل...</div>
    </div>

    <!-- REVIEWS -->
    <div class="section" id="s-reviews">
      <div id="reviewsList" class="loading">جاري التحميل...</div>
    </div>

    <!-- USERS -->
    <div class="section" id="s-users">
      <div id="usersList" class="loading">جاري التحميل...</div>
    </div>
  </main>
</div>

<script>
const API_BASE = window.location.origin + '/api';
const token = localStorage.getItem('token');
const role  = localStorage.getItem('role');

// Auth guard - admin only
if (!token || (role !== 'admin' && role !== 'superadmin')) {
  alert('يجب تسجيل الدخول كمشرف أولاً');
  window.location.href = 'login.html';
}
document.getElementById('adminName').textContent = localStorage.getItem('username') || 'مشرف';

function authHeaders() {
  return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
}

function showSection(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('s-'+id).classList.add('active');
  btn.classList.add('active');
  const titles = {overview:'نظرة عامة',attractions:'إدارة الأماكن',reviews:'إدارة التقييمات',users:'المستخدمون'};
  document.getElementById('pageTitle').textContent = titles[id];
  if (id==='attractions') loadAttractions();
  if (id==='reviews')     loadReviews();
  if (id==='users')       loadUsers();
}

// ── OVERVIEW ──────────────────────────────────
async function loadOverview() {
  try {
    const res = await fetch(`${API_BASE}/attractions/stats`, {headers: authHeaders()});
    const stats = await res.json();
    document.getElementById('statAttractions').textContent = stats.totalAttractions;
    document.getElementById('statPending').textContent = stats.pendingReviews;
    document.getElementById('statUsers').textContent = stats.totalUsers;
    document.getElementById('statReviews').textContent = stats.totalReviews;
    
    const atts = stats.recentAttractions;
    document.getElementById('recentAttractions').innerHTML = `
      <table class="data-table"><thead><tr><th>المكان</th><th>التصنيف</th><th>التقييم</th></tr></thead>
      <tbody>${atts.map(a=>`
        <tr><td><strong>${a.icon} ${a.name}</strong></td>
        <td><span class="badge ${a.category}">${{religious:'ديني',cultural:'ثقافي',entertainment:'ترفيه',dining:'مطاعم'}[a.category]}</span></td>
        <td>★ ${a.ratingAvg?.toFixed(1)||'—'}</td></tr>`).join('')}
      </tbody></table>`;
  } catch(e) { console.error(e); }
}

// ── ATTRACTIONS ───────────────────────────────
async function loadAttractions() {
  document.getElementById('attractionsTable').innerHTML = '<div class="loading">جاري التحميل...</div>';
  try {
    const res = await fetch(`${API_BASE}/attractions`, {headers: authHeaders()});
    const data = await res.json();
    const cats = {religious:'ديني',cultural:'ثقافي',entertainment:'ترفيه',dining:'مطاعم'};
    document.getElementById('attractionsTable').innerHTML = `
      <table class="data-table">
        <thead><tr><th>الصورة</th><th>الاسم</th><th>التصنيف</th><th>التقييم</th><th>إجراءات</th></tr></thead>
        <tbody>${data.map(a=>`
          <tr>
src="${window.location.origin}${a.imageUrl}"
            <td><strong>${a.name}</strong><br><small style="color:var(--text-muted)">${a.nameEn}</small></td>
            <td><span class="badge ${a.category}">${cats[a.category]||a.category}</span></td>
            <td>★ ${a.ratingAvg?.toFixed(1)||'—'}</td>
            <td><div class="action-btns">
              <button class="act-btn" onclick='editAttraction(${JSON.stringify(a)})'>تعديل</button>
              <button class="act-btn" onclick="uploadAttractionImage(${a.id})">📷</button>
              <button class="act-btn danger" onclick="deleteAttraction(${a.id})">حذف</button>
            </div></td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  } catch(e) {
    document.getElementById('attractionsTable').innerHTML = '<div class="loading">خطأ في التحميل</div>';
  }
}

function editAttraction(a) {
  document.getElementById('editId').value = a.id;
  document.getElementById('fName').value = a.name;
  document.getElementById('fNameEn').value = a.nameEn;
  document.getElementById('fCategory').value = a.category;
  document.getElementById('fIcon').value = a.icon;
  document.getElementById('fLat').value = a.latitude;
  document.getElementById('fLng').value = a.longitude;
  document.getElementById('fHours').value = a.openingHours;
  document.getElementById('fDesc').value = a.description;
  document.getElementById('fFeatured').value = a.isFeatured ? 'true' : 'false';
  if (a.imageUrl) {
    const preview = document.getElementById('imgPreview');
preview.src = `${window.location.origin}${a.imageUrl}`;
    preview.style.display = 'block';
  }
  document.querySelector('.add-form').scrollIntoView({ behavior: 'smooth' });
  showToastA('تم تحميل بيانات المكان للتعديل');
}

async function saveAttraction() {
  const id = document.getElementById('editId').value;
  const body = {
    name: document.getElementById('fName').value,
    nameEn: document.getElementById('fNameEn').value,
    category: document.getElementById('fCategory').value,
    icon: document.getElementById('fIcon').value || '📍',
    latitude: parseFloat(document.getElementById('fLat').value),
    longitude: parseFloat(document.getElementById('fLng').value),
    openingHours: document.getElementById('fHours').value,
    description: document.getElementById('fDesc').value,
    isFeatured: document.getElementById('fFeatured').value === 'true',
    imageUrl: null
  };

  if (!body.name || !body.latitude || !body.longitude) {
    showToastA('❌ يرجى ملء الاسم والإحداثيات على الأقل'); return;
  }

  try {
    const url = id ? `${API_BASE}/attractions/${id}` : `${API_BASE}/attractions`;
    const method = id ? 'PUT' : 'POST';
    const res = await fetch(url, { method, headers: authHeaders(), body: JSON.stringify(body) });
    if (!res.ok) throw new Error();
    const saved = await res.json();

    // Upload image if selected
    const imageFile = document.getElementById('fImage').files[0];
    if (imageFile && saved.id) {
      const fd = new FormData();
      fd.append('image', imageFile);
      await fetch(`${API_BASE}/attractions/${saved.id}/image`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
        body: fd
      });
    }

    showToastA('✅ تم الحفظ بنجاح');
    clearForm();
    loadAttractions();
  } catch(e) { showToastA('❌ فشل الحفظ، تحقق من البيانات'); }
}

async function deleteAttraction(id) {
  if (!confirm('هل أنت متأكد من الحذف؟')) return;
  await fetch(`${API_BASE}/attractions/${id}`, { method: 'DELETE', headers: authHeaders() });
  showToastA('✅ تم الحذف');
  loadAttractions();
}

async function uploadAttractionImage(id) {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/jpeg,image/png,image/webp';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const fd = new FormData(); fd.append('image', file);
    const res = await fetch(`${API_BASE}/attractions/${id}/image`, {
      method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: fd
    });
    if (res.ok) { showToastA('✅ تم رفع الصورة'); loadAttractions(); }
    else showToastA('❌ فشل الرفع');
  };
  input.click();
}

function previewImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const preview = document.getElementById('imgPreview');
    preview.src = e.target.result;
    preview.style.display = 'block';
    document.getElementById('imgPlaceholder').textContent = file.name;
  };
  reader.readAsDataURL(file);
}

function clearForm() {
  document.getElementById('editId').value = '';
  ['fName','fNameEn','fIcon','fLat','fLng','fHours','fDesc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fCategory').value = 'religious';
  document.getElementById('fFeatured').value = 'true';
  document.getElementById('fImage').value = '';
  document.getElementById('imgPreview').style.display = 'none';
  document.getElementById('imgPlaceholder').textContent = '📷 اضغط لاختيار صورة';
}

// ── REVIEWS ───────────────────────────────────
async function loadReviews() {
  document.getElementById('reviewsList').innerHTML = '<div class="loading">جاري التحميل...</div>';
  try {
    const res = await fetch(`${API_BASE}/reviews/pending`, {headers: authHeaders()});
    const data = await res.json();
    if (!data.length) {
      document.getElementById('reviewsList').innerHTML = '<div class="loading">لا توجد تقييمات معلّقة ✅</div>';
      return;
    }
    document.getElementById('reviewsList').innerHTML = data.map(r => `
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <div>
            <strong style="color:var(--text-main)">${r.attractionName || 'مكان غير معروف'}</strong>
            <span style="color:var(--text-muted);font-size:.78rem;margin-right:8px">— ${r.username}</span>
          </div>
          <div style="display:flex;gap:6px;align-items:center;">
            <span class="badge pending">معلّق</span>
            <span style="color:var(--gold);">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
          </div>
        </div>
        <p style="color:var(--text-muted);font-size:.85rem;margin-bottom:10px">"${r.comment || 'بدون تعليق'}"</p>
        <div class="action-btns">
          <button class="act-btn success" onclick="updateReview(${r.id},'approved')">✅ موافقة</button>
          <button class="act-btn danger"  onclick="updateReview(${r.id},'rejected')">❌ رفض</button>
        </div>
      </div>`).join('');
  } catch(e) { document.getElementById('reviewsList').innerHTML = '<div class="loading">خطأ في التحميل</div>'; }
}

async function updateReview(id, status) {
  await fetch(`${API_BASE}/reviews/${id}/status`, {
    method: 'PATCH', headers: authHeaders(), body: JSON.stringify(status)
  });
  showToastA(status === 'approved' ? '✅ تمت الموافقة' : '❌ تم الرفض');
  loadReviews();
}

// ── USERS ─────────────────────────────────────
async function loadUsers() {
  document.getElementById('usersList').innerHTML = '<div class="loading">جاري التحميل...</div>';
  try {
    const res = await fetch(`${API_BASE}/users`, {headers: authHeaders()});
    const data = await res.json();
    document.getElementById('usersList').innerHTML = `
      <table class="data-table">
        <thead><tr><th>المعرف</th><th>اسم المستخدم</th><th>البريد الإلكتروني</th><th>اللغة</th><th>التاريخ</th><th>إجراءات</th></tr></thead>
        <tbody>${data.map(u=>`
          <tr>
            <td>${u.id}</td>
            <td><strong>${u.username}</strong></td>
            <td>${u.email}</td>
            <td>${u.preferredLanguage === 'ar' ? 'العربية' : 'English'}</td>
            <td>${u.createdAt}</td>
            <td><div class="action-btns">
              <button class="act-btn danger" onclick="deleteUser(${u.id})">حذف</button>
            </div></td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  } catch(e) {
    document.getElementById('usersList').innerHTML = '<div class="loading">خطأ في التحميل</div>';
  }
}

async function deleteUser(id) {
  if (!confirm('حذف المستخدم نهائياً؟')) return;
  await fetch(`${API_BASE}/users/${id}`, { method: 'DELETE', headers: authHeaders() });
  showToastA('✅ تم الحذف');
  loadUsers();
}

function logout() { localStorage.clear(); window.location.href = 'login.html'; }

function showToastA(msg) {
  let t = document.getElementById('toastA');
  if (!t) { t = document.createElement('div'); t.id = 'toastA'; t.className = 'toast'; t.style.right='20px'; t.style.left='auto'; document.body.appendChild(t); }
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Load overview on start
loadOverview();
</script>
