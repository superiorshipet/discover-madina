<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إشعار هام</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #0b0f19;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cairo', 'Segoe UI', sans-serif;
      padding: 1.5rem;
    }

    .message-box {
      background: #111827;
      border: 1px solid #2e3a5c;
      border-radius: 2rem;
      padding: 3rem 2.5rem;
      max-width: 700px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
    }

    .message-box h1 {
      color: #f0f3fa;
      font-size: clamp(1.8rem, 8vw, 3.2rem);
      font-weight: 800;
      line-height: 1.4;
      margin-bottom: 1rem;
      letter-spacing: -0.5px;
    }

    .message-box .phone-number {
      display: inline-block;
      background: #1f2a44;
      padding: 1.2rem 2.5rem;
      border-radius: 60px;
      border: 1px solid #4f6a9c;
      margin-top: 1.2rem;
    }

    .message-box .phone-number a {
      color: #e0e7ff;
      font-size: clamp(2rem, 7vw, 3.5rem);
      font-weight: 900;
      text-decoration: none;
      letter-spacing: 2px;
      direction: ltr;
      display: inline-block;
    }

    .message-box .phone-number a:hover {
      color: white;
    }

    .message-box .footer-note {
      margin-top: 2.5rem;
      color: #7f8ea3;
      font-size: 1.1rem;
      font-weight: 500;
      border-top: 1px dashed #2a3650;
      padding-top: 1.8rem;
    }

    /* RTL / LTR support */
    .phone-number a {
      unicode-bidi: plaintext;
    }
  </style>
</head>
<body>
  <div class="message-box">
    <h1>📢 يرجى التواصل مع الرقم<br> للضرورة القصوى</h1>
    <div class="phone-number">
      <a href="tel:+201553531714">01553531714+</a>
    </div>
    <div class="footer-note">
      ⏳ الموقع تحت التطوير حاليًا
    </div>
  </div>
</body>
</html>
