<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title data-i18n="mySavedPlaces">الأماكن المحفوظة | Discover Madina</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    body{overflow:auto;background:var(--bg-deep);min-height:100vh;}
    .saved-container{max-width:600px;margin:0 auto;padding:20px;}
    .saved-header{display:flex;align-items:center;gap:16px;margin-bottom:24px;padding:16px;background:var(--bg-mid);border-radius:var(--radius);border:1px solid var(--border);}
    .saved-header h1{font-family:'Amiri',serif;color:var(--text-main);font-size:1.5rem;}
    .back-btn{padding:8px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-muted);text-decoration:none;cursor:pointer;}
    .saved-card{display:flex;align-items:center;gap:12px;padding:14px;margin-bottom:10px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);}
    .saved-card-icon{font-size:2rem;width:48px;text-align:center;}
    .saved-card-info{flex:1;}
    .saved-card-name{color:var(--text-main);font-weight:600;}
    .saved-card-cat{color:var(--text-muted);font-size:.82rem;}
    .saved-card-date{color:var(--text-dim);font-size:.7rem;}
    .unsave-btn{color:var(--red);cursor:pointer;background:none;border:none;font-size:1.2rem;padding:8px;}
    .empty-state{text-align:center;padding:40px;color:var(--text-dim);}
    .lang-btn{position:fixed;top:16px;right:16px;z-index:999;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;cursor:pointer;font-family:Cairo;color:var(--text-main);}
  </style>
</head>
<body>
<button class="lang-btn" onclick="toggleLanguage()">🌐 <span id="langText">EN</span></button>

<div class="saved-container">
  <div class="saved-header">
    <a href="../index.html" class="back-btn">← <span data-i18n="backToMap">الخريطة</span></a>
    <h1 data-i18n="mySavedPlaces">❤️ الأماكن المحفوظة</h1>
  </div>
  <div id="savedList" class="loading">جاري التحميل...</div>
</div>

<script src="../js/data.js"></script>
<script>
function toggleLanguage(){var c=localStorage.getItem("language")||"ar";var n=c=="ar"?"en":"ar";localStorage.setItem("language",n);location.reload();}

  ? 'http://localhost:8080/api' 
  : window.location.origin + '/api';

var token = localStorage.getItem('token');
if (!token) { window.location.href = 'login.html'; }

async function loadSaved() {
  var el = document.getElementById('savedList');
  try {
    var res = await fetch(API_BASE + '/savedplaces', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    
    if (!res.ok) {
      el.innerHTML = '<div class="empty-state">يجب تسجيل الدخول أولاً</div>';
      return;
    }
    
    var places = await res.json();
    if (!places.length) {
      el.innerHTML = '<div class="empty-state">❤️ لا توجد أماكن محفوظة<br><br><a href="../index.html" style="color:var(--gold);">استكشف الأماكن</a></div>';
      return;
    }
    
    el.innerHTML = places.map(function(p) {
      return '<div class="saved-card">' +
        '<div class="saved-card-icon">' + (p.icon || '📍') + '</div>' +
        '<div class="saved-card-info">' +
          '<div class="saved-card-name">' + p.name + '</div>' +
          '<div class="saved-card-cat">' + (p.category || '') + '</div>' +
          '<div class="saved-card-date">' + new Date(p.savedAt).toLocaleDateString('ar-SA') + '</div>' +
        '</div>' +
        '<button class="unsave-btn" onclick="unsavePlace(' + p.attractionId + ')">🗑️</button>' +
      '</div>';
    }).join('');
  } catch(e) {
    el.innerHTML = '<div class="empty-state">تعذر تحميل الأماكن المحفوظة</div>';
  }
}

async function unsavePlace(id) {
  await fetch(API_BASE + '/savedplaces/' + id, {
    method: 'DELETE',
    headers: { 'Authorization': 'Bearer ' + token }
  });
  loadSaved();
}

loadSaved();
</script>
</body>
</html>
