<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>الأماكن المحفوظة | Discover Madina</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    body{overflow:auto;background:var(--bg-deep);min-height:100vh;font-family:Cairo;}
    .saved-container{max-width:600px;margin:0 auto;padding:20px;}
    .saved-header{display:flex;align-items:center;gap:16px;margin-bottom:24px;padding:16px;background:var(--bg-mid);border-radius:var(--radius);border:1px solid var(--border);}
    .saved-header h1{font-family:'Amiri',serif;color:var(--text-main);font-size:1.5rem;margin:0;}
    .back-btn{padding:8px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-main);text-decoration:none;}
    .saved-card{display:flex;align-items:center;gap:12px;padding:14px;margin-bottom:10px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;}
    .saved-card:hover{border-color:var(--gold-dim);}
    .saved-card-icon{font-size:2rem;width:48px;text-align:center;}
    .saved-card-info{flex:1;}
    .saved-card-name{color:var(--text-main);font-weight:600;}
    .saved-card-cat{color:var(--text-muted);font-size:.82rem;}
    .unsave-btn{color:var(--red);cursor:pointer;background:none;border:none;font-size:1.2rem;padding:8px;}
    .empty-state{text-align:center;padding:60px 20px;color:var(--text-dim);}
    .empty-state a{color:var(--gold);text-decoration:none;font-size:1.1rem;}
    .lang-btn{position:fixed;top:16px;right:16px;z-index:999;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;cursor:pointer;font-family:Cairo;color:var(--text-main);}
  </style>
</head>
<body>
<button class="lang-btn" onclick="toggleLanguage()">🌐 <span id="langText">EN</span></button>

<div class="saved-container">
  <div class="saved-header">
    <a href="../index.html" class="back-btn">← الخريطة</a>
    <h1>❤️ الأماكن المحفوظة</h1>
  </div>
  <div id="savedList" style="color:var(--text-dim);text-align:center;padding:40px;">جاري التحميل...</div>
</div>

<script src="../js/data.js"></script>
<script>
function toggleLanguage(){var c=localStorage.getItem("language")||"ar";var n=c=="ar"?"en":"ar";localStorage.setItem("language",n);location.reload();}

var token = localStorage.getItem('token');
var role = localStorage.getItem('role');

if (!token) { 
  document.getElementById('savedList').innerHTML = '<div class="empty-state">🔐 يجب تسجيل الدخول أولاً<br><br><a href="login.html">تسجيل الدخول</a></div>';
}

async function loadSaved() {
  var el = document.getElementById('savedList');
  if (!token) return;
  
  try {
    var res = await fetch(API_BASE + '/savedplaces', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    
    if (!res.ok) throw new Error('Failed');
    
    var places = await res.json();
    
    if (!places || places.length === 0) {
      el.innerHTML = '<div class="empty-state">❤️ لا توجد أماكن محفوظة<br><br><a href="../index.html">استكشف الأماكن</a></div>';
      return;
    }
    
    var html = '';
    places.forEach(function(p) {
      html += '<div class="saved-card" onclick="location.href=\'../index.html?id=' + p.attractionId + '\'">' +
        '<div class="saved-card-icon">' + (p.icon || '📍') + '</div>' +
        '<div class="saved-card-info">' +
          '<div class="saved-card-name">' + p.name + '</div>' +
          '<div class="saved-card-cat">' + (p.category || '') + '</div>' +
        '</div>' +
        '<button class="unsave-btn" onclick="event.stopPropagation();unsavePlace(' + p.attractionId + ')">🗑️</button>' +
      '</div>';
    });
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = '<div class="empty-state">تعذر تحميل الأماكن المحفوظة</div>';
  }
}

async function unsavePlace(id) {
  if (!confirm('هل أنت متأكد من إلغاء الحفظ؟')) return;
  await fetch(API_BASE + '/savedplaces/' + id, {
    method: 'DELETE',
    headers: { 'Authorization': 'Bearer ' + token }
  });
  loadSaved();
}

loadSaved();

// Update language button text
setTimeout(function() {
  var lt = document.getElementById('langText');
  if (lt && typeof currentLang !== 'undefined') {
    lt.textContent = currentLang === 'ar' ? 'EN' : 'AR';
  }
}, 300);
</script>
</body>
</html>
