<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title data-i18n="register">إنشاء حساب | Discover Madina</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:auto;padding:20px;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 70% 80%,rgba(74,144,217,.04),transparent 60%);pointer-events:none;}
    .auth-wrap{width:100%;max-width:440px;}
    .auth-logo{text-align:center;margin-bottom:28px;}
    .auth-logo-icon{width:64px;height:64px;margin:0 auto 12px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));border-radius:18px;display:flex;align-items:center;justify-content:center;font-family:'Amiri',serif;font-size:2rem;color:var(--bg-deep);font-weight:700;}
    .auth-logo h1{font-family:'Amiri',serif;font-size:1.6rem;color:var(--gold);margin-bottom:4px;}
    .auth-logo p{font-size:.75rem;color:var(--text-muted);letter-spacing:3px;}
    .auth-card{background:var(--bg-mid);border:1px solid var(--border);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow);}
    .card-title{font-family:'Amiri',serif;font-size:1.2rem;color:var(--text-main);margin-bottom:20px;text-align:center;}
    .form-group{margin-bottom:16px;}
    .form-input,.lang-select{width:100%;padding:10px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-main);font-family:'Cairo',sans-serif;font-size:.9rem;outline:none;}
    .btn-main{width:100%;padding:12px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));border:none;border-radius:var(--radius-sm);color:var(--bg-deep);font-weight:700;cursor:pointer;margin-bottom:12px;}
    .login-link{text-align:center;font-size:.82rem;color:var(--text-muted);}
    .login-link a{color:var(--gold-dim);text-decoration:none;}
    .error-msg{background:rgba(224,85,85,.1);border:1px solid rgba(224,85,85,.3);border-radius:var(--radius-sm);padding:10px 14px;color:#e05555;font-size:.85rem;margin-bottom:14px;display:none;}
    .back-link{display:block;text-align:center;margin-top:18px;font-size:.82rem;color:var(--text-muted);text-decoration:none;}
  </style>
</head>
<body>
<button style="position:fixed;top:16px;right:16px;z-index:999;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;cursor:pointer;font-family:Cairo;color:var(--text-main);" onclick="toggleLanguage()">🌐 <span id="langText">EN</span></button>
<button style="position:fixed;top:16px;right:16px;z-index:999;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;cursor:pointer;font-family:Cairo;color:var(--text-main);font-size:0.85rem;" onclick="toggleLang()">🌐 <span id="lt">EN</span></button>
<div class="auth-wrap">
  <div class="auth-logo"><div class="auth-logo-icon">م</div><h1 data-i18n="appName">اكتشف المدينة</h1><p data-i18n="appSub">DISCOVER MADINA</p></div>
  <div class="auth-card">
    <div class="card-title" data-i18n="register">إنشاء حساب جديد</div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="form-group"><label data-i18n="username">اسم المستخدم</label><input class="form-input" type="text" id="username" data-i18n-placeholder="enterUsername" placeholder="أدخل اسم المستخدم"/></div>
    <div class="form-group"><label data-i18n="email">البريد الإلكتروني</label><input class="form-input" type="email" id="email" data-i18n-placeholder="enterEmail" placeholder="example@email.com"/></div>
    <div class="form-group"><label data-i18n="password">كلمة المرور</label><input class="form-input" type="password" id="password" data-i18n-placeholder="enterPassword" placeholder="6 أحرف على الأقل"/></div>
    <div class="form-group"><label data-i18n="confirmPassword">تأكيد كلمة المرور</label><input class="form-input" type="password" id="confirm" data-i18n-placeholder="enterPassword" placeholder="أعد كتابة كلمة المرور"/></div>
    <div class="form-group"><label data-i18n="preferredLanguage">اللغة المفضلة</label><select class="lang-select" id="lang"><option value="ar" data-i18n="arabic">العربية</option><option value="en" data-i18n="english">English</option></select></div>
    <button class="btn-main" id="regBtn" onclick="doRegister()"><span data-i18n="createAccount">إنشاء الحساب</span></button>
    <div class="login-link"><span data-i18n="haveAccount">لديك حساب؟</span> <a href="login.html"><span data-i18n="signIn">تسجيل الدخول</span></a></div>
  </div>
  <a href="../index.html" class="back-link"><span data-i18n="browseAsGuest">← تصفح كضيف</span></a>
</div>
<script src="../js/data.js"></script>
<script>
function t(key) { var lang = typeof currentLang !== 'undefined' ? currentLang : 'ar'; if (typeof TRANSLATIONS === 'undefined') return key; return (TRANSLATIONS[lang] && TRANSLATIONS[lang][key]) || (TRANSLATIONS['en'] && TRANSLATIONS['en'][key]) || key; }
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('[data-i18n]').forEach(function(el) { el.textContent = t(el.getAttribute('data-i18n')); });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) { el.placeholder = t(el.getAttribute('data-i18n-placeholder')); });
});
function showError(msg) { var el = document.getElementById('errorMsg'); el.textContent = msg; el.style.display = 'block'; }
async function doRegister() {
  var u = document.getElementById('username').value.trim(), e = document.getElementById('email').value.trim(), p = document.getElementById('password').value, c = document.getElementById('confirm').value, l = document.getElementById('lang').value;
  document.getElementById('errorMsg').style.display = 'none';
  if (!u || !e || !p) { showError(t('allFieldsRequired')); return; }
  if (p !== c) { showError(t('passwordsDontMatch')); return; }
  if (p.length < 6) { showError(t('passwordTooShort')); return; }
  var btn = document.getElementById('regBtn'); btn.disabled = true; btn.innerHTML = '<span>' + t('creating') + '</span>';
  try {
    var res = await fetch(API_BASE + '/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, email: e, password: p, preferredLanguage: l }) });
    var data = await res.json();
    if (!res.ok) { showError(data.message || t('serverError')); btn.disabled = false; btn.innerHTML = '<span>' + t('createAccount') + '</span>'; return; }
    localStorage.setItem('token', data.token); localStorage.setItem('username', data.username); localStorage.setItem('role', data.role);
    window.location.href = '../index.html';
  } catch(err) { showError(t('serverError')); btn.disabled = false; btn.innerHTML = '<span>' + t('createAccount') + '</span>'; }
}
</script>
<script src="../js/i18n.js"></script>
</body>
</html>
