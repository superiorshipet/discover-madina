<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>إنشاء حساب | Discover Madina</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:auto;padding:20px;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 70% 80%,rgba(74,144,217,.04),transparent 60%);pointer-events:none;}
    .auth-wrap{width:100%;max-width:440px;}
    .auth-logo{text-align:center;margin-bottom:28px;}
    .auth-logo-icon{width:64px;height:64px;margin:0 auto 12px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));border-radius:18px;display:flex;align-items:center;justify-content:center;font-family:'Amiri',serif;font-size:2rem;color:var(--bg-deep);font-weight:700;}
    .auth-logo h1{font-family:'Amiri',serif;font-size:1.6rem;color:var(--gold);margin-bottom:4px;}
    .auth-logo p{font-size:.75rem;color:var(--text-muted);letter-spacing:3px;}
    .auth-card{background:var(--bg-mid);border:1px solid var(--border);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow);}
    .card-title{font-family:'Amiri',serif;font-size:1.2rem;color:var(--text-main);margin-bottom:20px;text-align:center;}
    .form-group{margin-bottom:16px;}
    label{display:block;font-size:.8rem;color:var(--text-muted);margin-bottom:6px;font-weight:600;}
    .form-input{width:100%;padding:10px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-main);font-family:'Cairo',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;}
    .form-input:focus{border-color:var(--gold);}
    .form-input::placeholder{color:var(--text-dim);}
    .lang-select{width:100%;padding:10px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-main);font-family:'Cairo',sans-serif;font-size:.9rem;outline:none;}
    .btn-main{width:100%;padding:12px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));border:none;border-radius:var(--radius-sm);color:var(--bg-deep);font-family:'Cairo',sans-serif;font-size:.96rem;font-weight:700;cursor:pointer;transition:opacity .2s;margin-bottom:12px;}
    .btn-main:hover{opacity:.88;}
    .btn-main:disabled{opacity:.5;cursor:not-allowed;}
    .login-link{text-align:center;font-size:.82rem;color:var(--text-muted);}
    .login-link a{color:var(--gold-dim);text-decoration:none;}
    .error-msg{background:rgba(224,85,85,.1);border:1px solid rgba(224,85,85,.3);border-radius:var(--radius-sm);padding:10px 14px;color:#e05555;font-size:.85rem;margin-bottom:14px;display:none;}
    .back-link{display:block;text-align:center;margin-top:18px;font-size:.82rem;color:var(--text-muted);text-decoration:none;transition:color .2s;}
    .back-link:hover{color:var(--gold);}
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-logo">
    <div class="auth-logo-icon">م</div>
    <h1>اكتشف المدينة</h1>
    <p>DISCOVER MADINA</p>
  </div>
  <div class="auth-card">
    <div class="card-title">إنشاء حساب جديد</div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="form-group"><label>اسم المستخدم</label><input class="form-input" type="text" id="username" placeholder="أدخل اسم المستخدم"/></div>
    <div class="form-group"><label>البريد الإلكتروني</label><input class="form-input" type="email" id="email" placeholder="example@email.com"/></div>
    <div class="form-group"><label>كلمة المرور</label><input class="form-input" type="password" id="password" placeholder="6 أحرف على الأقل"/></div>
    <div class="form-group"><label>تأكيد كلمة المرور</label><input class="form-input" type="password" id="confirm" placeholder="أعد كتابة كلمة المرور"/></div>
    <div class="form-group"><label>اللغة المفضلة</label>
      <select class="lang-select" id="lang"><option value="ar">العربية</option><option value="en">English</option></select>
    </div>
    <button class="btn-main" id="regBtn" onclick="doRegister()">إنشاء الحساب</button>
    <div class="login-link">لديك حساب؟ <a href="login.html">تسجيل الدخول</a></div>
  </div>
  <a href="../index.html" class="back-link">← تصفح كضيف</a>
</div>
<script>
const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'http://localhost:8080/api'
  : `${window.location.origin}/api`;

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

async function doRegister() {
  const u = document.getElementById('username').value.trim();
  const e = document.getElementById('email').value.trim();
  const p = document.getElementById('password').value;
  const c = document.getElementById('confirm').value;
  const l = document.getElementById('lang').value;

  document.getElementById('errorMsg').style.display = 'none';
  if (!u || !e || !p) { showError('يرجى تعبئة جميع الحقول'); return; }
  if (p !== c) { showError('كلمة المرور غير متطابقة'); return; }
  if (p.length < 6) { showError('كلمة المرور 6 أحرف على الأقل'); return; }

  const btn = document.getElementById('regBtn');
  btn.disabled = true;
  btn.textContent = 'جاري الإنشاء...';

  try {
    const res = await fetch(`${API_BASE}/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, email: e, password: p, preferredLanguage: l })
    });
    const data = await res.json();
    if (!res.ok) { showError(data.message || 'خطأ في إنشاء الحساب'); return; }

    localStorage.setItem('token', data.token);
    localStorage.setItem('username', data.username);
    localStorage.setItem('role', data.role);
    window.location.href = '../index.html';
  } catch (err) {
    showError('تعذر الاتصال بالخادم. تأكد من تشغيل الـ backend.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'إنشاء الحساب';
  }
}
</script>
</body>
</html>
