<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title data-i18n="signIn">تسجيل الدخول | Discover Madina</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:auto;padding:20px;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(201,168,76,.07),transparent 60%);pointer-events:none;}
    .auth-wrap{width:100%;max-width:440px;}
    .auth-logo{text-align:center;margin-bottom:32px;}
    .auth-logo-icon{width:72px;height:72px;margin:0 auto 14px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));border-radius:20px;display:flex;align-items:center;justify-content:center;font-family:'Amiri',serif;font-size:2.4rem;color:var(--bg-deep);font-weight:700;}
    .auth-logo h1{font-family:'Amiri',serif;font-size:1.8rem;color:var(--gold);margin-bottom:4px;}
    .auth-logo p{font-size:.8rem;color:var(--text-muted);letter-spacing:3px;}
    .auth-card{background:var(--bg-mid);border:1px solid var(--border);border-radius:var(--radius);padding:32px;box-shadow:var(--shadow);}
    .role-tabs{display:flex;background:var(--bg-deep);border-radius:var(--radius-sm);padding:4px;margin-bottom:24px;}
    .role-tab{flex:1;padding:9px;text-align:center;border-radius:var(--radius-sm);font-family:'Cairo',sans-serif;font-size:.88rem;cursor:pointer;background:none;border:none;color:var(--text-muted);transition:all .2s;}
    .role-tab.active{background:var(--bg-raised);color:var(--gold);font-weight:700;}
    .form-group{margin-bottom:18px;}
    label{display:block;font-size:.82rem;color:var(--text-muted);margin-bottom:7px;font-weight:600;}
    .form-input{width:100%;padding:11px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-main);font-family:'Cairo',sans-serif;font-size:.92rem;outline:none;}
    .form-input:focus{border-color:var(--gold);}
    .btn-main{width:100%;padding:13px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));border:none;border-radius:var(--radius-sm);color:var(--bg-deep);font-weight:700;cursor:pointer;margin-bottom:14px;font-size:1rem;}
    .btn-guest,.btn-register{width:100%;padding:11px;background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-muted);cursor:pointer;margin-bottom:14px;font-size:.9rem;}
    .divider{text-align:center;font-size:.78rem;color:var(--text-dim);margin:6px 0 14px;}
    .error-msg{background:rgba(224,85,85,.1);border:1px solid rgba(224,85,85,.3);border-radius:var(--radius-sm);padding:10px 14px;color:#e05555;font-size:.85rem;margin-bottom:14px;display:none;}
    .back-link{display:block;text-align:center;margin-top:20px;font-size:.82rem;color:var(--text-muted);text-decoration:none;}
  </style>
</head>
<body>
<button style="position:fixed;top:16px;right:16px;z-index:999;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;cursor:pointer;font-family:Cairo;color:var(--text-main);" onclick="toggleLanguage()">🌐 <span id="langText">EN</span></button>
<button style="position:fixed;top:16px;right:16px;z-index:999;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;cursor:pointer;font-family:Cairo;color:var(--text-main);font-size:0.85rem;" onclick="toggleLang()">🌐 <span id="lt">EN</span></button>
<div class="auth-wrap">
  <div class="auth-logo"><div class="auth-logo-icon">م</div><h1 data-i18n="appName">اكتشف المدينة</h1><p data-i18n="appSub">DISCOVER MADINA</p></div>
  <div class="auth-card">
    <div class="role-tabs">
      <button class="role-tab active" onclick="setRole(this,'user')"><span data-i18n="user">مستخدم</span></button>
      <button class="role-tab" onclick="setRole(this,'admin')"><span data-i18n="admin">مشرف</span></button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="form-group"><label data-i18n="usernameOrEmail">اسم المستخدم أو البريد الإلكتروني</label><input class="form-input" type="text" id="username" data-i18n-placeholder="enterUsername" placeholder="أدخل اسم المستخدم"/></div>
    <div class="form-group"><label data-i18n="password">كلمة المرور</label><input class="form-input" type="password" id="password" data-i18n-placeholder="enterPassword" placeholder="أدخل كلمة المرور"/></div>
    <button class="btn-main" id="loginBtn" onclick="doLogin()"><span data-i18n="signIn">تسجيل الدخول</span></button>
    <div class="divider" data-i18n="or">أو</div>
    <button class="btn-guest" onclick="guestLogin()"><span data-i18n="guestContinue">المتابعة كضيف</span></button>
    <button class="btn-register" onclick="window.location='register.html'"><span data-i18n="register">إنشاء حساب جديد</span></button>
  </div>
  <a href="../index.html" class="back-link"><span data-i18n="browseAsGuest">← تصفح كضيف</span></a>
</div>
<script src="../js/data.js"></script>
<script>

function t(key) { var lang = typeof currentLang !== 'undefined' ? currentLang : 'ar'; if (typeof TRANSLATIONS === 'undefined') return key; return (TRANSLATIONS[lang] && TRANSLATIONS[lang][key]) || (TRANSLATIONS['en'] && TRANSLATIONS['en'][key]) || key; }

document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('[data-i18n]').forEach(function(el) { el.textContent = t(el.getAttribute('data-i18n')); });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) { el.placeholder = t(el.getAttribute('data-i18n-placeholder')); });
});

var currentRole = 'user';
function setRole(btn, role) { currentRole = role; document.querySelectorAll('.role-tab').forEach(function(t){t.classList.remove('active')}); btn.classList.add('active'); }
function showError(msg) { var el = document.getElementById('errorMsg'); el.textContent = msg; el.style.display = 'block'; }

async function doLogin() {
  var u = document.getElementById('username').value.trim(), p = document.getElementById('password').value.trim();
  if (!u || !p) { showError(t('allFieldsRequired')); return; }
  var btn = document.getElementById('loginBtn'); btn.disabled = true; btn.innerHTML = '<span>' + t('verifying') + '</span>';
  document.getElementById('errorMsg').style.display = 'none';
  try {
    var res = await fetch(API_BASE + '/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
    var data = await res.json();
    if (!res.ok) { showError(data.message || t('invalidCredentials')); btn.disabled = false; btn.innerHTML = '<span>' + t('signIn') + '</span>'; return; }
    localStorage.setItem('token', data.token); localStorage.setItem('username', data.username); localStorage.setItem('role', data.role);
    window.location.href = (data.role === 'admin' || data.role === 'superadmin') ? 'admin.html' : '../index.html';
  } catch(e) { showError(t('serverError')); btn.disabled = false; btn.innerHTML = '<span>' + t('signIn') + '</span>'; }
}

function guestLogin() { localStorage.setItem('role', 'guest'); window.location.href = '../index.html'; }
</script>
<script>function toggleLang(){var l=(typeof currentLang!=="undefined"?currentLang:"ar")==="ar"?"en":"ar";localStorage.setItem("language",l);location.reload();}document.getElementById("lt").textContent=(typeof currentLang!=="undefined"&&currentLang==="ar")?"EN":"AR";</script>
<script src="../js/i18n.js"></script>
</body>
</html>
