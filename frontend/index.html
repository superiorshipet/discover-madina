<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>اكتشف المدينة | Discover Madina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- Splash Screen -->
<div class="splash" id="splash">
  <div class="splash-inner">
    <div class="splash-logo">
      <div class="logo-ring"></div>
      <div class="logo-ring r2"></div>
      <span class="logo-letter">م</span>
    </div>
    <h1 class="splash-title">اكتشف المدينة</h1>
    <p class="splash-sub">Discover Madina</p>
    <div class="splash-bar"><div class="splash-fill"></div></div>
  </div>
</div>

<!-- App Shell -->
<div class="app" id="app">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
<div class="sidebar-header">
      <div class="brand">
        <div class="brand-icon">م</div>
        <div>
          <div class="brand-name">اكتشف المدينة</div>
          <div class="brand-tag" id="welcomeMsg" style="display: none; font-weight: 600; color: var(--gold);">مرحبا <span id="userNameSpan"></span></div>
        </div>
      </div>
      <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
    </div>

    <div class="search-wrap">
      <input class="search-input" id="searchInput" type="text" placeholder="ابحث عن مسجد، متحف، مطعم..." oninput="doSearch()" />
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </div>

    <div class="filter-chips" id="filterChips">
      <button class="chip active" onclick="filterCat(this,'all')">الكل</button>
      <button class="chip" onclick="filterCat(this,'religious')">🕌 ديني</button>
      <button class="chip" onclick="filterCat(this,'cultural')">🏛️ ثقافي</button>
      <button class="chip" onclick="filterCat(this,'entertainment')">🎡 ترفيه</button>
      <button class="chip" onclick="filterCat(this,'dining')">🍽️ مطاعم</button>
    </div>

    <div class="places-list" id="placesList"></div>

    <div class="sidebar-footer">
<a id="loginBtn" class="footer-btn" href="#">🔐 تسجيل الدخول</a>
<a id="adminBtn" href="pages/admin.html" class="footer-btn admin">⚙️ لوحة الإدارة</a>
    </div>
  </aside>

  <!-- Map -->
  <main class="map-wrap">
    <div id="map"></div>

    <header class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()">
        <span></span><span></span><span></span>
      </button>
      <div class="topbar-title">
        <span class="topbar-logo">م</span>
        اكتشف المدينة
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" onclick="locateUser()" title="موقعي">📍</button>
        <button class="icon-btn" onclick="openChatbot()" title="المساعد الذكي">💬</button>
        <a href="pages/login.html" class="icon-btn" title="حسابي">👤</a>
      </div>
    </header>

    <div class="cat-tabs">
      <button class="cat-tab active" onclick="filterCatMobile(this,'all')">الكل</button>
      <button class="cat-tab" onclick="filterCatMobile(this,'religious')">🕌 ديني</button>
      <button class="cat-tab" onclick="filterCatMobile(this,'cultural')">🏛️ ثقافي</button>
      <button class="cat-tab" onclick="filterCatMobile(this,'entertainment')">🎡 ترفيه</button>
      <button class="cat-tab" onclick="filterCatMobile(this,'dining')">🍽️ مطاعم</button>
    </div>

    <div class="bottom-sheet" id="bottomSheet">
      <div class="bs-handle"></div>
      <div class="bs-header">
        <span class="bs-title">أماكن مقترحة</span>
        <span class="bs-badge">اليوم</span>
      </div>
      <div class="bs-cards" id="bsCards"></div>
    </div>
  </main>

  <!-- Place Detail Panel -->
  <div class="detail-panel" id="detailPanel">
    <button class="detail-close" onclick="closeDetail()">✕</button>
    <div class="detail-img-wrap">
      <div class="detail-img" id="detailImg"></div>
      <div class="detail-badge" id="detailCat"></div>
    </div>
    <div class="detail-body">
      <h2 class="detail-name" id="detailName"></h2>
      <div class="detail-meta">
        <span class="detail-rating" id="detailRating"></span>
        <span class="detail-hours" id="detailHours"></span>
      </div>
      <p class="detail-desc" id="detailDesc"></p>
      <div class="detail-actions">
        <button class="daction primary" onclick="getDirections()">🗺️ الاتجاهات</button>
        <button class="daction" onclick="savePlace()">⭐ حفظ</button>
        <button class="daction" onclick="openReview()">✏️ تقييم</button>
        <button class="daction" onclick="triggerImageUpload()">📷 صورة</button>
      </div>
    </div>
  </div>

  <!-- Chatbot -->
  <div class="chatbot" id="chatbot">
    <div class="chatbot-header">
      <div class="cb-info">
        <div class="cb-avatar">م</div>
        <div>
          <div class="cb-name">مرشد المدينة</div>
          <div class="cb-status">● متاح الآن</div>
        </div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;"><button onclick="clearChat()" style="background:none;border:1px solid var(--border);border-radius:6px;color:var(--text-muted);font-size:.7rem;padding:3px 8px;cursor:pointer;font-family:Cairo,sans-serif;">مسح</button><button class="cb-close" onclick="closeChatbot()">✕</button></div>
    </div>
    <div class="chatbot-body" id="chatbotBody">
      <div class="cb-msg bot">
        <div class="cb-bubble">مرحباً! أنا مرشدك الذكي في المدينة المنورة 🌙 كيف أقدر أساعدك؟</div>
      </div>
      <div class="cb-suggestions">
        <button onclick="sendSuggestion(this)">أماكن مناسبة للعائلة</button>
        <button onclick="sendSuggestion(this)">أقرب مطعم</button>
        <button onclick="sendSuggestion(this)">المسجد النبوي</button>
      </div>
    </div>
    <div class="chatbot-footer">
      <input type="text" id="chatInput" placeholder="اكتب سؤالك..." onkeydown="if(event.key==='Enter')sendChat()" />
      <button class="send-btn" onclick="sendChat()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
  <button class="chatbot-fab" id="chatbotFab" onclick="openChatbot()">💬</button>

  <!-- Review Modal -->
  <div class="modal-overlay" id="reviewOverlay" onclick="closeReview()">
    <div class="modal" onclick="event.stopPropagation()">
      <h3 class="modal-title">أضف تقييمك</h3>
      <div class="stars-input" id="starsInput">
        <span onclick="setRating(1)">★</span><span onclick="setRating(2)">★</span>
        <span onclick="setRating(3)">★</span><span onclick="setRating(4)">★</span>
        <span onclick="setRating(5)">★</span>
      </div>
      <textarea class="modal-textarea" id="reviewText" placeholder="شاركنا تجربتك..."></textarea>
      <div class="modal-actions">
        <button class="modal-btn primary" onclick="submitReview()">إرسال التقييم</button>
        <button class="modal-btn" onclick="closeReview()">إلغاء</button>
      </div>
    </div>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
