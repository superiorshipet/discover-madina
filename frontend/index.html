<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<script>var currentLang=localStorage.getItem("language")||"ar";document.documentElement.lang=currentLang;document.documentElement.dir=currentLang==="ar"?"rtl":"ltr";function toggleLanguage(){currentLang=currentLang==="ar"?"en":"ar";localStorage.setItem("language",currentLang);location.reload();}</script>
  <title>اكتشف المدينة | Discover Madina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="splash" id="splash">
  <div class="splash-inner">
    <div class="splash-logo"><div class="logo-ring"></div><div class="logo-ring r2"></div><span class="logo-letter">م</span></div>
    <h1 class="splash-title" data-i18n="appName">اكتشف المدينة</h1>
    <p class="splash-sub" data-i18n="appSub">Discover Madina</p>
    <div class="splash-bar"><div class="splash-fill"></div></div>
  </div>
</div>

<div class="app" id="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand"><div class="brand-icon">م</div><div><div class="brand-name" data-i18n="appName">اكتشف المدينة</div><div class="brand-tag" id="welcomeMsg" style="display:none;color:var(--gold);"><span data-i18n="welcome">مرحبا</span> <span id="userNameSpan"></span></div></div></div>
      <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
    </div>
    <div class="search-wrap">
      <input class="search-input" id="searchInput" type="text" data-i18n-placeholder="searchPlaceholder" placeholder="ابحث عن مسجد، متحف، مطعم..." oninput="doSearch()" />
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </div>
    <div class="filter-chips" id="filterChips">
      <button class="chip active" onclick="filterCat(this,'all')"><span data-i18n="all">الكل</span></button>
      <button class="chip" onclick="locateUser()">📍 <span data-i18n="myLocation">موقعي</span></button>
      <button class="chip" onclick="filterCat(this,'religious')">🕌 <span data-i18n="religious">ديني</span></button>
      <button class="chip" onclick="filterCat(this,'cultural')">🏛️ <span data-i18n="cultural">ثقافي</span></button>
      <button class="chip" onclick="filterCat(this,'entertainment')">🎡 <span data-i18n="entertainment">ترفيه</span></button>
      <button class="chip" onclick="filterCat(this,'dining')">🍽️ <span data-i18n="dining">مطاعم</span></button>
         <button class="chip" onclick="toggleLanguage()" title="Change Language">
        <span id="langIcon">🌐</span> <span id="langText">EN</span>
      </button>
    </div>
    <div class="places-list" id="placesList"></div>
    <div class="sidebar-footer">
      <a id="loginBtn" class="footer-btn" href="#"><span data-i18n="login">🔐 تسجيل الدخول</span></a>
      <a id="adminBtn" href="pages/admin.html" class="footer-btn admin hidden"><span data-i18n="adminPanel">⚙️ لوحة الإدارة</span></a>
    </div>
  </aside>

  <main class="map-wrap">
    <div id="map"></div>
    <header class="topbar"> 
      <button class="menu-btn" onclick="toggleSidebar()"><span></span><span></span><span></span></button>
   
    </header>
    <div class="bottom-sheet" id="bottomSheet">
      <div class="bs-handle"></div>
      <div class="bs-header"><span class="bs-title" data-i18n="suggestedPlaces">أماكن مقترحة</span><span class="bs-badge" data-i18n="today">اليوم</span></div>
      <div class="bs-cards" id="bsCards"></div>
    </div>
  </main>

  <button class="chatbot-fab" id="chatbotFab" onclick="openChatbot()">💬</button>
  <div class="chatbot" id="chatbot">
    <div class="chatbot-header">
      <div class="cb-info"><div class="cb-avatar">م</div><div><div class="cb-name">مرشد المدينة</div><div class="cb-status">● متاح الآن</div></div></div>
      <div style="display:flex;gap:6px;"><button onclick="clearChat()" style="background:none;border:1px solid var(--border);border-radius:6px;color:var(--text-muted);font-size:.7rem;padding:3px 8px;cursor:pointer;">مسح</button><button class="cb-close" onclick="closeChatbot()">✕</button></div>
    </div>
    <div class="chatbot-body" id="chatbotBody"></div>
    <div class="chatbot-footer"><input type="text" id="chatInput" placeholder="اكتب سؤالك..." onkeydown="if(event.key==='Enter')sendChat()" /><button class="send-btn" onclick="sendChat()"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button></div>
  </div>

  <div class="detail-panel" id="detailPanel">
    <button class="detail-close" onclick="closeDetail()">✕</button>
    <div class="detail-img-wrap"><div class="detail-img" id="detailImg"></div><div class="detail-badge" id="detailCat"></div></div>
    <div class="detail-body">
      <h2 class="detail-name" id="detailName"></h2>
      <div class="detail-meta"><span class="detail-rating" id="detailRating"></span><span class="detail-hours" id="detailHours"></span></div>
      <p class="detail-desc" id="detailDesc"></p>
      <div class="detail-reviews"><h4 class="reviews-title" data-i18n="reviews">📝 التقييمات والمراجعات</h4><div class="reviews-list" id="reviewsList"><p class="no-reviews" data-i18n="noReviews">لا توجد تقييمات بعد</p></div></div>
      <div class="detail-actions">
        <button class="daction" onclick="getDirections()">🗺️ <span data-i18n="directions">الاتجاهات</span></button>
        <button class="daction" onclick="openReview()">✏️ <span data-i18n="review">تقييم</span></button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="reviewOverlay" onclick="closeReview()">
    <div class="modal" onclick="event.stopPropagation()">
      <h3 class="modal-title" data-i18n="writeReview">أضف تقييمك</h3>
      <div class="stars-input" id="starsInput"><span onclick="setRating(1)">★</span><span onclick="setRating(2)">★</span><span onclick="setRating(3)">★</span><span onclick="setRating(4)">★</span><span onclick="setRating(5)">★</span></div>
      <textarea class="modal-textarea" id="reviewText" data-i18n-placeholder="shareExperience" placeholder="شاركنا تجربتك..."></textarea>
      <div class="modal-actions"><button class="modal-btn primary" onclick="submitReview()"><span data-i18n="submitReview">إرسال التقييم</span></button><button class="modal-btn" onclick="closeReview()"><span data-i18n="cancel">إلغاء</span></button></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>function t(key){var l=localStorage.getItem("language")||"ar";return (typeof TRANSLATIONS!=="undefined"&&TRANSLATIONS[l]&&TRANSLATIONS[l][key])||key}function toggleLanguage(){var n=(localStorage.getItem("language")||"ar")==="ar"?"en":"ar";localStorage.setItem("language",n);location.reload();}</script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/i18n.js"></script>
</body>
</html>
